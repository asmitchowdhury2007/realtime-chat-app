<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #messages {
            list-style-type: none;
            margin: 0;
            padding: 0;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
        }
        #messages li {
            padding: 8px 16px;
            border-bottom: 1px solid #eee;
        }
        #messages li:last-child {
            border-bottom: none;
        }
        #form {
            display: flex;
            margin-top: 10px;
         }
        #input {
            flex-grow: 1;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-left: 10px;
        } 
        button:hover {
            background: #45a049;
        }
        .system-message {
            color: #666;
            font-style: italic;
            font-size: 0.9em;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Simple Chat</h1>
    <div id="username-container">
        <input type="text" id="username-input" placeholder="Enter your username" />
        <button id="set-username">Set Username</button>
    </div>
    <ul id="messages"></ul>
    <form id="form" action="#">
        <input id="input" autocomplete="off" placeholder="Type your message..." />
        <button type="submit">Send</button>
    </form>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        console.log("Connected");
        //create username
        const username = document.querySelector("#username-input");
        const setUsernameButton = document.querySelector("#set-username");
        let currentUsername = "Anonymous";
        setUsernameButton.addEventListener("click", (data)=>{
            const newUsername = username.value;
            if(newUsername){
                socket.emit('set username',newUsername);
                currentUsername = newUsername;
                username.value = "";
            }
            
        })
        //form
        let input = document.querySelector("#input");
        let form = document.querySelector("#form");
        let messages = document.querySelector("#messages");

        

        form.addEventListener("submit", (data)=>{
            data.preventDefault();
            
            const message = input.value.trim();
            if(message === ""){
                return ;
            }
            else{
                
                socket.emit("chat messages", message);
                input.value ="";
            }
        });
        socket.on("chat messages", (data) => {
            const li = document.createElement("li");
            li.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
            messages.appendChild(li);
            messages.scrollTop = messages.scrollHeight;
            
        });
        socket.on('change',(data)=>{
            const li = document.createElement("li");
            li.className = 'system-message';
            if(data.oldusername === "Anonymous"){
                li.innerText =`${data.newusername} has joined the chat`;
                
            }
            else{
                li.innerText = `${data.oldusername} has changed to ${data.newusername}`;
                
            }
            messages.appendChild(li);
        });
        
        socket.on('left room', (data)=>{
            const li = document.createElement("li");
            li.className = 'system-message';
            li.innerText =`${data.username} has left the chat`;
        })
        
    </script>
</body>
</html>
